      <rect x="136" y="246" width="306" height="430" rx="34" fill="url(#LeftScreenGradient)" />
      <rect x="136" y="246" width="306" height="64" rx="34" fill="#22385C" />
      <rect x="136" y="276" width="306" height="34" fill="#22385C" />
      <rect x="136" y="632" width="306" height="44" fill="#0E1623" />
      <rect x="166" y="266" width="24" height="24" rx="6" fill="#6EAEFF" />
      <rect x="204" y="269" width="122" height="18" rx="9" fill="#D5E5FF" fill-opacity="0.18" />
      <rect x="344" y="269" width="66" height="18" rx="9" fill="#D5E5FF" fill-opacity="0.10" />
      <rect x="166" y="352" width="246" height="122" rx="18" fill="#22406C" fill-opacity="0.88" />
      <rect x="166" y="504" width="214" height="82" rx="18" fill="#1A2F50" fill-opacity="0.92" />
      <rect x="190" y="380" width="160" height="16" rx="8" fill="#E7F2FF" fill-opacity="0.18" />
      <rect x="190" y="410" width="126" height="14" rx="7" fill="#E7F2FF" fill-opacity="0.10" />
      <rect x="190" y="531" width="126" height="14" rx="7" fill="#E7F2FF" fill-opacity="0.12" />
      <rect x="136" y="632" width="64" height="44" fill="#3F7FFF" fill-opacity="0.54" />

      <rect x="548" y="212" width="374" height="560" rx="54" fill="url(#RightFrameGradient)" stroke="#7E63D6" stroke-opacity="0.48" stroke-width="4" />
      <rect x="582" y="246" width="306" height="430" rx="34" fill="url(#RightScreenGradient)" />
      <rect x="582" y="246" width="306" height="64" rx="34" fill="#2A1F4D" />
      <rect x="582" y="276" width="306" height="34" fill="#2A1F4D" />
      <rect x="582" y="632" width="306" height="44" fill="#0F0A1A" />
      <rect x="612" y="266" width="24" height="24" rx="6" fill="#B89CFF" />
      <rect x="650" y="269" width="122" height="18" rx="9" fill="#F0E8FF" fill-opacity="0.16" />
      <rect x="790" y="269" width="66" height="18" rx="9" fill="#F0E8FF" fill-opacity="0.10" />
      <rect x="612" y="352" width="246" height="148" rx="18" fill="#32245C" fill-opacity="0.88" />
      <rect x="612" y="528" width="178" height="58" rx="18" fill="#241A42" fill-opacity="0.94" />
      <rect x="636" y="382" width="156" height="16" rx="8" fill="#F4ECFF" fill-opacity="0.16" />
      <rect x="636" y="412" width="114" height="14" rx="7" fill="#F4ECFF" fill-opacity="0.10" />
      <rect x="636" y="545" width="110" height="14" rx="7" fill="#F4ECFF" fill-opacity="0.12" />
      <rect x="582" y="632" width="64" height="44" fill="#8D72FF" fill-opacity="0.40" />
    </g>

    <rect x="236" y="448" width="552" height="128" rx="64" fill="#0B121E" fill-opacity="0.72" stroke="#304156" stroke-opacity="0.70" stroke-width="8" />
    <rect x="486" y="204" width="52" height="568" rx="26" fill="url(#DividerGradient)" />
    <line x1="512" y1="204" x2="512" y2="772" stroke="#E6F1FF" stroke-opacity="0.82" stroke-width="14" stroke-linecap="round" />

    <g filter="url(#ArrowGlow)" opacity="0.52">
      <path d="M 308 512 H 692" fill="none" stroke="url(#ArrowGradient)" stroke-width="58" stroke-linecap="round" />
      <path d="M 620 436 L 720 512 L 620 588" fill="none" stroke="#CAAFFF" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <path d="M 308 512 H 684" fill="none" stroke="url(#ArrowGradient)" stroke-width="30" stroke-linecap="round" />
    <path d="M 618 444 L 708 512 L 618 580" fill="none" stroke="#E2D3FF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="308" cy="512" r="24" fill="#6FB0FF" />
    <circle cx="308" cy="512" r="10" fill="#F7FBFF" />
    <circle cx="512" cy="512" r="22" fill="#FFFFFF" fill-opacity="0.10" stroke="#E4F0FF" stroke-opacity="0.52" stroke-width="6" />
  </g>
</svg>
