    <circle cx="284" cy="320" r="288" fill="url(#LeftGlowGradient)" />
    <circle cx="752" cy="320" r="288" fill="url(#RightGlowGradient)" />
    <path d="M 132 846 C 270 754 410 708 512 708 C 614 708 754 754 892 846" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="56" stroke-linecap="round" />

