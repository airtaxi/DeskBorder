<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DeskBorder app icon</title>
  <desc>Two Windows-style workspaces separated by a highlighted border with a bold arrow crossing it.</desc>

  <defs>
    <linearGradient id="BackgroundGradient" x1="120" y1="80" x2="904" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C2436" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0A0F18" />
    </linearGradient>
    <radialGradient id="LeftGlowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(284 292) rotate(90) scale(382 330)">
      <stop offset="0%" stop-color="#3578FF" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#3578FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="RightGlowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(752 292) rotate(90) scale(382 330)">
      <stop offset="0%" stop-color="#9B7DFF" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#9B7DFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="LeftFrameGradient" x1="102" y1="184" x2="476" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#243A60" />
      <stop offset="100%" stop-color="#141E34" />
    </linearGradient>
    <linearGradient id="RightFrameGradient" x1="548" y1="184" x2="922" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B214B" />
      <stop offset="100%" stop-color="#18122D" />
    </linearGradient>
    <linearGradient id="LeftScreenGradient" x1="136" y1="218" x2="442" y2="648" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#182845" />
      <stop offset="100%" stop-color="#10192A" />
    </linearGradient>
    <linearGradient id="RightScreenGradient" x1="582" y1="218" x2="888" y2="648" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#20173A" />
      <stop offset="100%" stop-color="#110D1E" />
    </linearGradient>
    <linearGradient id="DividerGradient" x1="486" y1="188" x2="538" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#90C3FF" stop-opacity="0.18" />
      <stop offset="50%" stop-color="#C8DFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#B39BFF" stop-opacity="0.22" />
    </linearGradient>
    <linearGradient id="ArrowGradient" x1="308" y1="512" x2="708" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#59A0FF" />
      <stop offset="55%" stop-color="#73B9FF" />
      <stop offset="100%" stop-color="#C6A4FF" />
    </linearGradient>
    <filter id="PanelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#05070D" flood-opacity="0.42" />
    </filter>
    <filter id="ArrowGlow" x="-30%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="IconClip">
      <rect width="1024" height="1024" rx="224" />
    </clipPath>
  </defs>

